<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" shape-rendering="crispEdges">
  <!-- frost amulet half buried in sand -->
  <!-- sand/shore -->
  <rect x="0" y="14" width="20" height="6" fill="#c4a35a"/>
  <rect x="0" y="13" width="3" height="1" fill="#c4a35a"/>
  <rect x="6" y="13" width="5" height="1" fill="#c4a35a"/>
  <rect x="15" y="13" width="5" height="1" fill="#c4a35a"/>
  <!-- amulet chain -->
  <rect x="8" y="8" width="1" height="1" fill="#888"/>
  <rect x="9" y="7" width="1" height="1" fill="#888"/>
  <rect x="10" y="7" width="1" height="1" fill="#888"/>
  <rect x="11" y="8" width="1" height="1" fill="#888"/>
  <!-- amulet gem (diamond shape) -->
  <rect x="9" y="9" width="2" height="1" fill="#66bbff"/>
  <rect x="8" y="10" width="4" height="2" fill="#4499dd"/>
  <rect x="9" y="12" width="2" height="1" fill="#66bbff"/>
  <!-- gem highlight -->
  <rect x="9" y="9" width="1" height="1" fill="#99ddff"/>
  <rect x="8" y="10" width="1" height="1" fill="#88ccff"/>
  <!-- glow effect -->
  <rect x="7" y="9" width="1" height="1" fill="#aaddff" opacity="0.5"/>
  <rect x="12" y="10" width="1" height="1" fill="#aaddff" opacity="0.5"/>
  <rect x="7" y="11" width="1" height="1" fill="#aaddff" opacity="0.5"/>
  <rect x="12" y="11" width="1" height="1" fill="#aaddff" opacity="0.5"/>
  <rect x="9" y="8" width="1" height="1" fill="#aaddff" opacity="0.3"/>
  <!-- frost on sand around it -->
  <rect x="6" y="14" width="1" height="1" fill="#ddeeff"/>
  <rect x="13" y="14" width="1" height="1" fill="#ddeeff"/>
  <rect x="8" y="15" width="1" height="1" fill="#ddeeff"/>
  <rect x="11" y="15" width="1" height="1" fill="#ddeeff"/>
</svg>
