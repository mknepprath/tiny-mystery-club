<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" shape-rendering="crispEdges">
  <!-- Rock formation - outer -->
  <rect x="3" y="4" width="14" height="15" fill="#7A7A7A"/>
  <rect x="5" y="3" width="10" height="2" fill="#8A8A8A"/>
  <rect x="7" y="2" width="6" height="2" fill="#9A9A9A"/>
  <rect x="1" y="8" width="3" height="10" fill="#6A6A6A"/>
  <rect x="16" y="7" width="3" height="11" fill="#6A6A6A"/>
  <!-- Rock details -->
  <rect x="3" y="5" width="2" height="2" fill="#5A5A5A"/>
  <rect x="15" y="4" width="2" height="2" fill="#5A5A5A"/>
  <rect x="2" y="14" width="2" height="3" fill="#5A5A5A"/>
  <rect x="16" y="13" width="2" height="4" fill="#5A5A5A"/>
  <!-- Cave opening - stepped rectangle for pixel look -->
  <rect x="6" y="7" width="8" height="11" fill="#2A2A2A"/>
  <rect x="7" y="6" width="6" height="1" fill="#2A2A2A"/>
  <rect x="5" y="10" width="1" height="6" fill="#2A2A2A"/>
  <rect x="14" y="9" width="1" height="7" fill="#2A2A2A"/>
  <!-- Deeper darkness -->
  <rect x="7" y="9" width="6" height="8" fill="#1A1A1A"/>
  <rect x="8" y="11" width="4" height="5" fill="#0D0D0D"/>
  <!-- Moss -->
  <rect x="4" y="7" width="2" height="1" fill="#4A7A4A"/>
  <rect x="13" y="6" width="3" height="1" fill="#4A7A4A"/>
  <rect x="5" y="9" width="1" height="2" fill="#3A6A3A"/>
  <rect x="14" y="8" width="1" height="2" fill="#3A6A3A"/>
</svg>
