<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" shape-rendering="crispEdges">
  <!-- Paper body -->
  <rect x="3" y="3" width="13" height="14" fill="#F5E6C8"/>
  <rect x="4" y="2" width="12" height="1" fill="#F5E6C8"/>
  <!-- Yellowed aging -->
  <rect x="4" y="5" width="11" height="2" fill="#EDD9B5"/>
  <rect x="5" y="10" width="10" height="2" fill="#EDD9B5"/>
  <!-- Jagged torn left edge -->
  <rect x="3" y="3" width="1" height="2" fill="#F5E6C8"/>
  <rect x="2" y="5" width="1" height="1" fill="#F5E6C8"/>
  <rect x="3" y="6" width="1" height="3" fill="#F5E6C8"/>
  <rect x="2" y="9" width="1" height="2" fill="#F5E6C8"/>
  <rect x="3" y="11" width="1" height="1" fill="#F5E6C8"/>
  <rect x="2" y="12" width="1" height="1" fill="#F5E6C8"/>
  <rect x="3" y="13" width="1" height="2" fill="#F5E6C8"/>
  <rect x="2" y="15" width="1" height="1" fill="#F5E6C8"/>
  <rect x="3" y="16" width="1" height="1" fill="#F5E6C8"/>
  <!-- Text lines (tiny dark rects) -->
  <rect x="5" y="5" width="8" height="1" fill="#4A4038"/>
  <rect x="5" y="7" width="10" height="1" fill="#4A4038"/>
  <rect x="5" y="9" width="7" height="1" fill="#4A4038"/>
  <rect x="5" y="11" width="9" height="1" fill="#4A4038"/>
  <rect x="5" y="13" width="5" height="1" fill="#4A4038"/>
  <!-- Paper shadow/fold -->
  <rect x="14" y="4" width="1" height="12" fill="#E0D0A8"/>
</svg>
