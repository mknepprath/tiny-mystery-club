<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" shape-rendering="crispEdges">
  <!-- underwater music bubbles -->
  <!-- water surface -->
  <rect x="0" y="6" width="20" height="1" fill="#4a90d9"/>
  <rect x="0" y="7" width="20" height="13" fill="#3a78b8"/>
  <!-- music note bubbles rising -->
  <!-- bubble 1 with note -->
  <rect x="5" y="4" width="2" height="2" fill="#88ccff"/>
  <rect x="5" y="4" width="1" height="1" fill="#aaddff"/>
  <!-- bubble 2 -->
  <rect x="12" y="3" width="3" height="3" fill="#88ccff"/>
  <rect x="12" y="3" width="1" height="1" fill="#aaddff"/>
  <!-- music note symbol underwater -->
  <rect x="8" y="10" width="2" height="1" fill="#ffdd44"/>
  <rect x="10" y="9" width="1" height="2" fill="#ffdd44"/>
  <rect x="10" y="8" width="1" height="1" fill="#ffdd44"/>
  <!-- second note -->
  <rect x="14" y="12" width="2" height="1" fill="#ffdd44"/>
  <rect x="16" y="11" width="1" height="2" fill="#ffdd44"/>
  <rect x="16" y="10" width="1" height="1" fill="#ffdd44"/>
  <!-- small bubbles -->
  <rect x="7" y="8" width="1" height="1" fill="#88ccff"/>
  <rect x="15" y="7" width="1" height="1" fill="#88ccff"/>
  <rect x="3" y="9" width="1" height="1" fill="#88ccff"/>
  <rect x="10" y="14" width="1" height="1" fill="#88ccff"/>
  <rect x="6" y="13" width="1" height="1" fill="#88ccff"/>
  <!-- wavy sound lines -->
  <rect x="4" y="15" width="1" height="1" fill="#6699cc"/>
  <rect x="5" y="16" width="2" height="1" fill="#6699cc"/>
  <rect x="7" y="15" width="1" height="1" fill="#6699cc"/>
  <rect x="11" y="16" width="1" height="1" fill="#6699cc"/>
  <rect x="12" y="17" width="2" height="1" fill="#6699cc"/>
  <rect x="14" y="16" width="1" height="1" fill="#6699cc"/>
</svg>
