<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" shape-rendering="crispEdges">
  <!-- Ground/dirt base -->
  <rect x="0" y="0" width="20" height="20" fill="#8B7355"/>
  <rect x="2" y="3" width="3" height="1" fill="#7A6344"/>
  <rect x="14" y="15" width="4" height="1" fill="#7A6344"/>
  <!-- Left footprint (webbed) - angled slightly -->
  <rect x="4" y="12" width="1" height="3" fill="#5C4A2E"/>
  <rect x="5" y="11" width="1" height="4" fill="#5C4A2E"/>
  <rect x="6" y="12" width="1" height="3" fill="#5C4A2E"/>
  <!-- Left foot webbing -->
  <rect x="4" y="15" width="1" height="1" fill="#6B5636"/>
  <rect x="5" y="15" width="1" height="2" fill="#6B5636"/>
  <rect x="6" y="15" width="1" height="1" fill="#6B5636"/>
  <rect x="3" y="13" width="1" height="1" fill="#6B5636"/>
  <rect x="7" y="13" width="1" height="1" fill="#6B5636"/>
  <!-- Right footprint (webbed) - angled slightly other way -->
  <rect x="11" y="5" width="1" height="3" fill="#5C4A2E"/>
  <rect x="12" y="4" width="1" height="4" fill="#5C4A2E"/>
  <rect x="13" y="5" width="1" height="3" fill="#5C4A2E"/>
  <!-- Right foot webbing -->
  <rect x="11" y="8" width="1" height="1" fill="#6B5636"/>
  <rect x="12" y="8" width="1" height="2" fill="#6B5636"/>
  <rect x="13" y="8" width="1" height="1" fill="#6B5636"/>
  <rect x="10" y="6" width="1" height="1" fill="#6B5636"/>
  <rect x="14" y="6" width="1" height="1" fill="#6B5636"/>
  <!-- Mud splatter -->
  <rect x="8" y="10" width="1" height="1" fill="#6B5636"/>
  <rect x="9" y="3" width="1" height="1" fill="#6B5636"/>
  <rect x="15" y="11" width="1" height="1" fill="#6B5636"/>
</svg>
