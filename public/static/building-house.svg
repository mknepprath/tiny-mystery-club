<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" shape-rendering="crispEdges">
  <!-- Foundation -->
  <rect x="3" y="14" width="14" height="5" fill="#6B5B4F"/>
  <rect x="3" y="14" width="14" height="1" fill="#7D6B5D"/>
  <!-- Walls -->
  <rect x="4" y="7" width="12" height="7" fill="#E8B87A"/>
  <!-- Roof -->
  <rect x="2" y="6" width="16" height="1" fill="#CD5C5C"/>
  <rect x="4" y="5" width="12" height="1" fill="#CD5C5C"/>
  <rect x="6" y="4" width="8" height="1" fill="#B54848"/>
  <rect x="8" y="3" width="4" height="1" fill="#B54848"/>
  <!-- Door -->
  <rect x="8" y="10" width="4" height="4" fill="#5B8C5A"/>
  <rect x="10" y="12" width="1" height="1" fill="#3D5C3A"/>
  <!-- Window -->
  <rect x="5" y="9" width="2" height="2" fill="#87CEEB"/>
  <rect x="6" y="9" width="1" height="2" fill="#6BAACC"/>
  <rect x="5" y="10" width="2" height="1" fill="#6BAACC"/>
  <!-- Chimney -->
  <rect x="13" y="3" width="2" height="4" fill="#8B4513"/>
  <rect x="12" y="2" width="4" height="1" fill="#A0522D"/>
  <!-- Smoke -->
  <rect x="14" y="1" width="1" height="1" fill="#CCC" opacity="0.6"/>
  <rect x="15" y="0" width="1" height="1" fill="#CCC" opacity="0.4"/>
</svg>
