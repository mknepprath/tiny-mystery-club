<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" shape-rendering="crispEdges">
  <!-- Base platform -->
  <rect x="2" y="16" width="16" height="3" fill="#808080"/>
  <rect x="2" y="16" width="16" height="1" fill="#909090"/>
  <rect x="3" y="19" width="14" height="1" fill="#6A6A6A"/>
  <!-- Middle column -->
  <rect x="5" y="10" width="10" height="6" fill="#999999"/>
  <rect x="5" y="10" width="10" height="1" fill="#AAAAAA"/>
  <rect x="5" y="10" width="1" height="6" fill="#AAAAAA"/>
  <rect x="14" y="10" width="1" height="6" fill="#777777"/>
  <!-- Top flat surface (empty) -->
  <rect x="3" y="8" width="14" height="2" fill="#B0B0B0"/>
  <rect x="3" y="8" width="14" height="1" fill="#C0C0C0"/>
  <!-- Stone block lines -->
  <rect x="5" y="13" width="10" height="1" fill="#888888"/>
  <rect x="8" y="10" width="1" height="6" fill="#888888"/>
  <rect x="11" y="10" width="1" height="6" fill="#888888"/>
  <!-- Shadow on ground -->
  <rect x="4" y="19" width="12" height="1" fill="#5A5A5A"/>
</svg>
