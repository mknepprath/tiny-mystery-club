<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" shape-rendering="crispEdges">
  <!-- Foundation -->
  <rect x="2" y="14" width="16" height="5" fill="#8B7355"/>
  <rect x="2" y="14" width="16" height="1" fill="#A0896C"/>
  <!-- Walls -->
  <rect x="3" y="6" width="14" height="8" fill="#E8DCC8"/>
  <!-- Roof -->
  <rect x="1" y="5" width="18" height="1" fill="#8B4513"/>
  <rect x="3" y="4" width="14" height="1" fill="#8B4513"/>
  <rect x="5" y="3" width="10" height="1" fill="#A0522D"/>
  <rect x="7" y="2" width="6" height="1" fill="#A0522D"/>
  <!-- Door -->
  <rect x="8" y="10" width="4" height="4" fill="#5B8C5A"/>
  <rect x="10" y="11" width="1" height="1" fill="#3D5C3A"/>
  <!-- Columns -->
  <rect x="4" y="7" width="2" height="7" fill="#D4C8B0"/>
  <rect x="14" y="7" width="2" height="7" fill="#D4C8B0"/>
  <!-- Windows -->
  <rect x="6" y="8" width="2" height="2" fill="#87CEEB"/>
  <rect x="12" y="8" width="2" height="2" fill="#87CEEB"/>
  <!-- Flag pole -->
