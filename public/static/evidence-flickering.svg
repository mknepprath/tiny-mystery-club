<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" shape-rendering="crispEdges">
  <!-- Oil lamp / lantern with flickering glow -->
  <!-- Glow -->
  <rect x="6" y="3" width="8" height="6" fill="#FFF4B0" opacity="0.4"/>
  <rect x="7" y="2" width="6" height="2" fill="#FFF9D0" opacity="0.3"/>
  <rect x="5" y="5" width="2" height="3" fill="#FFF4B0" opacity="0.2"/>
  <rect x="13" y="5" width="2" height="3" fill="#FFF4B0" opacity="0.2"/>
  <!-- Flame -->
  <rect x="9" y="4" width="2" height="3" fill="#FFD700"/>
  <rect x="9" y="3" width="2" height="1" fill="#FFA500"/>
  <rect x="10" y="2" width="1" height="1" fill="#FF6600"/>
  <!-- Lamp body -->
  <rect x="7" y="7" width="6" height="2" fill="#8B7355"/>
  <rect x="8" y="9" width="4" height="5" fill="#A0896C"/>
  <rect x="7" y="9" width="1" height="5" fill="#8B7355"/>
  <rect x="12" y="9" width="1" height="5" fill="#8B7355"/>
  <!-- Base -->
  <rect x="7" y="14" width="6" height="2" fill="#6B5B4F"/>
  <!-- Scorch marks on ground -->
  <rect x="3" y="17" width="2" height="1" fill="#3A3A3A"/>
  <rect x="14" y="18" width="3" height="1" fill="#3A3A3A"/>
  <rect x="8" y="19" width="2" height="1" fill="#3A3A3A"/>
  <rect x="16" y="16" width="1" height="1" fill="#4A4A4A"/>
</svg>
